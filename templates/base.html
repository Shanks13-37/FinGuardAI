<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FinGuard AI{% endblock %}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Chart.js for visualizations (Admin) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Navigation -->
        <nav class="navbar glass-panel">
            <div class="logo">
                <span class="gradient-text">FinGuard AI</span>
            </div>
            <ul class="nav-links">
                <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">User Portal</a></li>
                <li><a href="/admin" class="{% if request.path == '/admin' %}active{% endif %}">Admin Dashboard</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="content">
            {% block content %}{% endblock %}
        </main>
        
        <footer>
            <p>&copy; 2026 FinGuard AI. Secure, Explainable, Intelligent.</p>
        </footer>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
